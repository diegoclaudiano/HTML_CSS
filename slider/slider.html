<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sliders</title>
  <link rel="stylesheet" href="./slide.css">
</head>
<body>
  
  <!-- ===== destaques/sliders ====== -->
    <div class="slider">
      <div class="slides">
        <!-- Radio buttons -->
         <input type="radio" name="radio-btn" id="radio1">
         <input type="radio" name="radio-btn" id="radio2">
         <input type="radio" name="radio-btn" id="radio3">
         <input type="radio" name="radio-btn" id="radio4">
  
         <!-- Slide images -->
          <div class="slide first">
            <img src="./img/pizza-queijo.png" alt="pizza 3 queijos">
            <h2>Pizza 3 queijos</h2>
          </div>
          <div class="slide">
            <img src="./img/pizza_calabresa.png" alt="pizza calabresa">
            <h2>Pizza Calabresa</h2>
          </div>
          <div class="slide">
            <img src="./img/pizza_da-casa.png" alt="pizza da casa">
            <h2>Pizza da casa</h2>
          </div>
          <div class="slide">
            <img src="./img/pizza_margherita.png" alt="pizza margherita">
            <h2>Pizza margherita</h2>
          </div>
  
          <!-- navigation auto -->
           <div class="navigation-auto">
            <div class="auto-btn1"></div>
            <div class="auto-btn2"></div>
            <div class="auto-btn3"></div>
            <div class="auto-btn4"></div>
           </div>
      </div>
  
      <div class="manual-navigation">
        <label for="radio1" class="manual-btn"></label>
        <label for="radio2" class="manual-btn"></label>
        <label for="radio3" class="manual-btn"></label>
        <label for="radio4" class="manual-btn"></label>
      </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
